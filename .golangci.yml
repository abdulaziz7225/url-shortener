version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    paths:
      - libs/gen

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/amusaev/url-shortener
