run:
  timeout: 5m
  tests: true

issues:
  exclude-dirs:
    - libs/gen
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/amusaev/url-shortener
  revive:
    rules:
      - name: exported
        disabled: true
