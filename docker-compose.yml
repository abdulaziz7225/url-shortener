name: url-shortener

x-service-healthcheck: &ops-healthcheck
  interval: 5s
  timeout: 3s
  retries: 12
  start_period: 10s

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: urlshortener
      POSTGRES_PASSWORD: urlshortener
      POSTGRES_DB: urlshortener
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlshortener -d urlshortener"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  counter:
    build:
      context: .
      dockerfile: services/counter/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
      OTLP_ENDPOINT: jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/healthz"]
      <<: *ops-healthcheck
    depends_on:
      redis:
        condition: service_healthy

  persistency-controller:
    build:
      context: .
      dockerfile: services/persistency-controller/Dockerfile
    environment:
      POSTGRES_DSN: postgres://urlshortener:urlshortener@postgres:5432/urlshortener?sslmode=disable
      REDIS_ADDR: redis:6379
      OTLP_ENDPOINT: jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/healthz"]
      <<: *ops-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  writer:
    build:
      context: .
      dockerfile: services/writer/Dockerfile
    environment:
      COUNTER_ADDR: counter:9090
      PERSISTENCY_ADDR: persistency-controller:9090
      SHORT_URL_BASE: http://localhost:8080
      OTLP_ENDPOINT: jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/healthz"]
      <<: *ops-healthcheck
    depends_on:
      counter:
        condition: service_healthy
      persistency-controller:
        condition: service_healthy

  reader:
    build:
      context: .
      dockerfile: services/reader/Dockerfile
    environment:
      PERSISTENCY_ADDR: persistency-controller:9090
      OTLP_ENDPOINT: jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/healthz"]
      <<: *ops-healthcheck
    depends_on:
      persistency-controller:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      WRITER_ADDR: writer:9090
      READER_ADDR: reader:9090
      CORS_ORIGIN: "*"
      OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      <<: *ops-healthcheck
    depends_on:
      writer:
        condition: service_healthy
      reader:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
